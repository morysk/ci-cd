name: python app unittest

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-versions: [3.10, 3.11, 3.12] 


    steps:
    - name: checkout code
      uses: actions/checkout@v6

    - name: setup python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-versions }}
    
    - name: install dependencies 
      run: |
        cd task-1
        python -m pip install --upgrade pip
      
    - name: run tests
      run: |
        cd task-1
        python -m unittest discover
    
    - name: notify success
      run: echo "Test passed on python version ${{ matrix.python-versions }}"
      if: success()